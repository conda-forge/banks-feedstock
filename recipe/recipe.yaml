schema_version: 1

context:
  name: banks
  version: "2.4.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/banks-${{ version }}.tar.gz
  sha256: ff575732fc67d5493a73c21e0d7268bc49e86fff02b0b8735e8efb9fcb9af3a4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - filetype >=1.2.0
    - python >=${{ python_min }}
    - griffe
    - jinja2
    - pydantic
    - deprecated
    - platformdirs

tests:
  - python:
      imports:
        - banks
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A prompt programming language
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/masci/banks

extra:
  recipe-maintainers:
    - jan-janssen
